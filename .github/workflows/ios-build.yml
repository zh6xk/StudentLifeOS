name: iOS Build & Generate IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# Izin wajib agar GitHub Actions boleh membuat halaman Release
permissions:
  contents: write

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Menginstal Xcodegen dan alat penyuntik tanda tangan (ldid)
      - name: Install Dependencies
        run: |
          brew install xcodegen
          brew install ldid

      - name: Generate Xcode Project
        run: xcodegen generate

      # Membiarkan Xcode membuat aplikasi polos (tanpa memicu error keamanan)
      - name: Build Project (Raw Device Build)
        run: |
          xcodebuild clean build \
            -project "StudentLifeOS.xcodeproj" \
            -scheme "StudentLifeOS" \
            -configuration Release \
            -sdk iphoneos \
            CONFIGURATION_BUILD_DIR="${PWD}/build" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # Menyuntikkan ruang tanda tangan palsu agar bisa dibaca oleh ESign
      - name: Inject Fake Signature (Untuk ESign)
        run: |
          ldid -S build/StudentLifeOS.app

      - name: Membungkus menjadi .ipa
        run: |
          mkdir -p Payload
          mv build/StudentLifeOS.app Payload/
          zip -r StudentLifeOS.ipa Payload

      - name: Upload ke GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "StudentLifeOS Build #${{ github.run_number }}"
          files: StudentLifeOS.ipa

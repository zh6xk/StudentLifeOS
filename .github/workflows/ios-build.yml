name: iOS Build & Generate IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew install xcodegen ldid

      - name: Generate Xcode Project
        run: xcodegen generate

      # Memaksa Xcode merakit file inti dengan menghapus CODE_SIGNING_ALLOWED=NO
      - name: Build Project (Force Compile)
        run: |
          xcodebuild clean build \
            -project "StudentLifeOS.xcodeproj" \
            -scheme "StudentLifeOS" \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            CONFIGURATION_BUILD_DIR="${PWD}/build" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            PROVISIONING_PROFILE_SPECIFIER=""

      # Memeriksa file, menyuntikkan ldid, dan membungkus
      - name: Inject Signature & Pack IPA
        run: |
          APP_PATH=$(find build -type d -name "StudentLifeOS.app" | head -n 1)
          EXEC_PATH="$APP_PATH/StudentLifeOS"
          
          if [ -f "$EXEC_PATH" ]; then
            echo "SUKSES: File inti aplikasi ditemukan! Menyuntikkan format iOS..."
            ldid -S "$EXEC_PATH"
            
            echo "Membungkus menjadi .ipa..."
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -qr StudentLifeOS.ipa Payload
          else
            echo "GAGAL: Xcode masih bandel dan menghilangkan filenya!"
            exit 1
          fi

      - name: Upload ke GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "StudentLifeOS Build #${{ github.run_number }}"
          files: StudentLifeOS.ipa

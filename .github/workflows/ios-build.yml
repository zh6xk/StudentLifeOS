name: iOS Build & Generate IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew install xcodegen ldid

      # MESIN PEMBERSIH OTOMATIS: Menghapus karakter aneh/tersembunyi di nama file
      - name: Sanitize Swift Files (Auto-Fix)
        run: |
          if [ -d "Sources" ]; then
            echo "Memeriksa dan membersihkan nama file di folder Sources..."
            find Sources -type f -name "*.swift*" | while read -r file; do
              dir=$(dirname "$file")
              base=$(basename "$file")
              # Hanya menyisakan huruf, angka, titik, strip, dan underscore
              clean_base=$(echo "$base" | tr -cd '[:alnum:]._-')
              if [ "$base" != "$clean_base" ]; then
                echo "Memperbaiki nama: '$base' menjadi '$clean_base'"
                mv "$file" "$dir/$clean_base"
              fi
            done
          fi

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build Project (Raw Compile)
        run: |
          xcodebuild clean build \
            -project "StudentLifeOS.xcodeproj" \
            -scheme "StudentLifeOS" \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Inject Signature & Pack IPA
        run: |
          echo "=== MENCARI LOKASI .APP DARI XCODE ==="
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -type d -name "StudentLifeOS.app" | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "GAGAL: .app tidak ditemukan sama sekali."
            exit 1
          fi
          echo "Lokasi .app: $APP_PATH"

          echo "=== MEMBACA NAMA EXECUTABLE DARI Info.plist ==="
          EXEC_NAME=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP_PATH/Info.plist")
          EXEC_PATH="$APP_PATH/$EXEC_NAME"
          echo "Nama executable: $EXEC_NAME"
          echo "Lokasi binary: $EXEC_PATH"

          if [ ! -f "$EXEC_PATH" ]; then
            echo "GAGAL: Info.plist menyebut '$EXEC_NAME' tapi file tidak ada."
            ls -la "$APP_PATH"
            exit 1
          fi

          echo "=== MENYUNTIK SIGNATURE KE SEMUA BINARY (termasuk widget extension) ==="
          # Sign dulu binary di dalam setiap .appex (widget extension), baru main binary
          if [ -d "$APP_PATH/PlugIns" ]; then
            find "$APP_PATH/PlugIns" -name "*.appex" | while read APPEX; do
              APPEX_NAME=$(basename "$APPEX" .appex)
              APPEX_EXEC="$APPEX/$APPEX_NAME"
              if [ -f "$APPEX_EXEC" ]; then
                echo "Signing extension: $APPEX_EXEC"
                ldid -S "$APPEX_EXEC"
              else
                echo "PERINGATAN: binary extension tidak ditemukan di $APPEX"
                ls -la "$APPEX"
              fi
            done
          else
            echo "PERINGATAN: Tidak ada folder PlugIns di dalam .app -- widget tidak ter-embed!"
          fi

          echo "Signing main binary: $EXEC_PATH"
          ldid -S "$EXEC_PATH"

          echo "Membungkus menjadi .ipa..."
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -qr StudentLifeOS.ipa Payload

      - name: Upload ke GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "StudentLifeOS Build #${{ github.run_number }}"
          files: StudentLifeOS.ipa
name: iOS Build & Generate IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# Izin wajib agar GitHub Actions boleh membuat halaman Release
permissions:
  contents: write

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Xcodegen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build Project (Raw Build)
        run: |
          xcodebuild clean build \
            -project "StudentLifeOS.xcodeproj" \
            -scheme "StudentLifeOS" \
            -configuration Release \
            -sdk iphoneos \
            SYMROOT="${PWD}/build" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Inject Fake Signature & Pack IPA
        run: |
          # 1. Cari lokasi asli folder .app secara otomatis
          APP_PATH=$(find build -type d -name "StudentLifeOS.app" | head -n 1)
          
          # 2. Suntikkan Tanda Tangan Palsu pakai tool bawaan Mac (codesign)
          codesign -s - -f --deep "$APP_PATH"
          
          # 3. Bungkus menjadi file .ipa
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r StudentLifeOS.ipa Payload

      - name: Upload ke GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "StudentLifeOS Build #${{ github.run_number }}"
          files: StudentLifeOS.ipa

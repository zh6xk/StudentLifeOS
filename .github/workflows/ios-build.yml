name: iOS Build & Generate IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew install xcodegen ldid

      # MESIN PEMBERSIH OTOMATIS: Menghapus karakter aneh/tersembunyi di nama file
      - name: Sanitize Swift Files (Auto-Fix)
        run: |
          if [ -d "Sources" ]; then
            echo "Memeriksa dan membersihkan nama file di folder Sources..."
            find Sources -type f -name "*.swift*" | while read -r file; do
              dir=$(dirname "$file")
              base=$(basename "$file")
              # Hanya menyisakan huruf, angka, titik, strip, dan underscore
              clean_base=$(echo "$base" | tr -cd '[:alnum:]._-')
              if [ "$base" != "$clean_base" ]; then
                echo "Memperbaiki nama: '$base' menjadi '$clean_base'"
                mv "$file" "$dir/$clean_base"
              fi
            done
          fi

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build Project (Raw Compile)
        run: |
          xcodebuild clean build \
            -project "StudentLifeOS.xcodeproj" \
            -scheme "StudentLifeOS" \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Inject Signature & Pack IPA
        run: |
          echo "Mencari lokasi .app..."
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -type d -name "StudentLifeOS.app" | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "GAGAL: Xcode tidak membuat folder aplikasi sama sekali."
            exit 1
          fi
          
          # Binary name pasti sama dengan nama folder .app tanpa ekstensi
          APP_NAME=$(basename "$APP_PATH" .app)
          EXEC_PATH="$APP_PATH/$APP_NAME"
          
          echo "Lokasi .app: $APP_PATH"
          echo "Lokasi binary: $EXEC_PATH"

          if [ -f "$EXEC_PATH" ]; then
            echo "SUKSES: File inti ditemukan! Menyuntikkan format iOS..."
            ldid -S "$EXEC_PATH"
            
            BUILD_DIR=$(dirname "$APP_PATH")
            if [ -d "$BUILD_DIR/StudentLifeOSWidget.appex" ] && ! [ -d "$APP_PATH/PlugIns/StudentLifeOSWidget.appex" ]; then
              echo "Memasukkan Widget secara manual ke dalam aplikasi (karena Xcode melewatinya)..."
              mkdir -p "$APP_PATH/PlugIns"
              cp -r "$BUILD_DIR/StudentLifeOSWidget.appex" "$APP_PATH/PlugIns/"
            fi
            
            echo "Mencari dan menyuntikkan format iOS ke ekstensi Widget (jika ada)..."
            find "$APP_PATH/PlugIns" -name "*.appex" -type d 2>/dev/null | while read appex_dir; do
              appex_name=$(basename "$appex_dir" .appex)
              appex_exec="$appex_dir/$appex_name"
              if [ -f "$appex_exec" ]; then
                echo "Menandatangani ekstensi: $appex_name"
                ldid -S "$appex_exec"
              fi
            done
            
            echo "Membungkus menjadi .ipa..."
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -qr StudentLifeOS.ipa Payload
          else
            echo "GAGAL: Xcode hanya membuat folder kosong karena file kode sumber tidak terhubung dengan benar."
            exit 1
          fi

      - name: Upload ke GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "StudentLifeOS Build #${{ github.run_number }}"
          files: StudentLifeOS.ipa
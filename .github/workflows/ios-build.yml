name: iOS Build & Generate IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew install xcodegen ldid

      - name: Generate Xcode Project
        run: xcodegen generate

      # Membiarkan Xcode merakit secara natural di brankas DerivedData miliknya
      - name: Build Project (Natural Compile)
        run: |
          xcodebuild clean build \
            -project "StudentLifeOS.xcodeproj" \
            -scheme "StudentLifeOS" \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # Detektif pencari file, penyuntik ldid, dan pembungkus IPA
      - name: Inject Signature & Pack IPA
        run: |
          echo "=== MENCARI LOKASI ASLI DARI XCODE ==="
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -type d -name "StudentLifeOS.app" | head -n 1)
          EXEC_PATH=$(find ~/Library/Developer/Xcode/DerivedData -type f -name "StudentLifeOS" | head -n 1)
          
          echo "Lokasi .app: $APP_PATH"
          echo "Lokasi binary: $EXEC_PATH"
          
          # Menggabungkan file jika Xcode memisahkannya
          if [ "$EXEC_PATH" != "$APP_PATH/StudentLifeOS" ] && [ -n "$EXEC_PATH" ]; then
              echo "Memasukkan binary ke dalam folder .app..."
              cp "$EXEC_PATH" "$APP_PATH/StudentLifeOS"
              EXEC_PATH="$APP_PATH/StudentLifeOS"
          fi

          if [ -f "$EXEC_PATH" ]; then
            echo "SUKSES: File inti ditemukan! Menyuntikkan format iOS..."
            ldid -S "$EXEC_PATH"
            
            echo "Membungkus menjadi .ipa..."
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -qr StudentLifeOS.ipa Payload
          else
            echo "GAGAL: Binary benar-benar tidak dibuat oleh Xcode."
            exit 1
          fi

      - name: Upload ke GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "StudentLifeOS Build #${{ github.run_number }}"
          files: StudentLifeOS.ipa

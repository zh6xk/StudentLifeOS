name: iOS Build & Generate IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew install xcodegen
          brew install ldid

      - name: Generate Xcode Project
        run: xcodegen generate

      # Merakit aplikasi secara utuh ke dalam format Archive khusus iPhone (arm64)
      - name: Build Project (Archive)
        run: |
          xcodebuild archive \
            -project "StudentLifeOS.xcodeproj" \
            -scheme "StudentLifeOS" \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            -archivePath build/StudentLifeOS.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # Mengekstrak, menyuntikkan ruang tanda tangan iOS (ldid) langsung ke inti file, lalu dibungkus
      - name: Inject Signature & Pack IPA
        run: |
          # Mencari lokasi pasti aplikasinya di dalam Archive
          APP_PATH="build/StudentLifeOS.xcarchive/Products/Applications/StudentLifeOS.app"
          EXEC_PATH="$APP_PATH/StudentLifeOS"
          
          echo "Menyuntikkan ruang tanda tangan iOS (ldid)..."
          ldid -S "$EXEC_PATH"
          
          echo "Membungkus menjadi .ipa..."
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -qr StudentLifeOS.ipa Payload

      - name: Upload ke GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "StudentLifeOS Build #${{ github.run_number }}"
          files: StudentLifeOS.ipa

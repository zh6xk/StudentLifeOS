name: iOS Build & Generate IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew install xcodegen
          brew install ldid

      - name: Generate Xcode Project
        run: xcodegen generate

      # Menggunakan "build" biasa agar Xcode tidak menghapus aplikasinya
      - name: Build Project (Raw Build)
        run: |
          xcodebuild clean build \
            -project "StudentLifeOS.xcodeproj" \
            -scheme "StudentLifeOS" \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            CONFIGURATION_BUILD_DIR="${PWD}/build" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # Radar pencari otomatis + Suntikan ldid
      - name: Inject Signature & Pack IPA
        run: |
          echo "Mencari lokasi folder .app..."
          APP_PATH=$(find build -type d -name "StudentLifeOS.app" | head -n 1)
          echo "Ditemukan di: $APP_PATH"
          
          EXEC_PATH="$APP_PATH/StudentLifeOS"
          
          echo "Menyuntikkan ruang tanda tangan iOS (ldid)..."
          ldid -S "$EXEC_PATH"
          
          echo "Membungkus menjadi .ipa..."
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -qr StudentLifeOS.ipa Payload

      - name: Upload ke GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "StudentLifeOS Build #${{ github.run_number }}"
          files: StudentLifeOS.ipa

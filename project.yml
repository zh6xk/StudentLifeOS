name: StudentLifeOS
options:
  bundleIdPrefix: com.studentlife
targets:
  StudentLifeOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
        excludes:
          - Widget.swift
        buildPhase: sources
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.studentlife.StudentLifeOS
    entitlements:
      path: Sources/StudentLifeOS.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.studentlife.shared
    dependencies:
      - target: StudentLifeOSWidget
        embed: true

  StudentLifeOSWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.studentlife.StudentLifeOS.StudentLifeOSWidget
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
    sources:
      - path: Sources/Widget.swift
      - path: Sources/Models.swift
    info:
      path: Sources/Widget-Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Sources/Widget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.studentlife.shared
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
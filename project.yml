name: StudentLifeOS
options:
  bundleIdPrefix: com.studentlife
targets:
  StudentLifeOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
        excludes:
          - Widget.swift
        buildPhase: sources
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.studentlife.StudentLifeOS

  StudentLifeOSWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/Widget.swift
    info:
      path: Sources/Widget-Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    dependencies:
      - target: StudentLifeOS
